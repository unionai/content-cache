# Pinned local and CI toolchain. The Go version matches the module version and
# the Buildkite lint step installs from this file on every branch.
[settings]
experimental = true
lockfile = true

[tools]
go = "latest"
golangci-lint = "latest"
"go:github.com/nikolaydubina/go-cover-treemap" = "1.5.1"
goreleaser = "2.15.4"

[tasks.lint]
description = "Run golangci-lint with the repository configuration"
run = "golangci-lint run --verbose --timeout 3m"

[tasks.fix]
description = "Auto-fix lint issues"
run = "golangci-lint run --fix"

[tasks.test]
description = "Run the Go test suite"
run = "go test ./..."

[tasks.coverage]
description = "Run the Go test suite with coverage output"
run = "go test -coverprofile coverage.out -coverpkg=./... ./..."

[tasks.build]
description = "Build the content-cache binary"
run = "go build -o content-cache ./cmd/content-cache"

[tasks.ci]
description = "Run the main local CI checks"
depends = ["lint", "test"]
